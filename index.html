<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>Mathtime</title>
  <link rel="stylesheet" href="style.css" />
</head>

<body class="dark-mode">
   <button id="creditsButton" class="button" style="position: fixed; top: 10px; left: 10px; z-index: 1100; cursor: pointer; background-color: #4CAF50;">
  Credits
</button>
  <h1>Mathtime</h1>
  <p>A game site built by Derrick Richard</p>

  <input type="text" id="searchBar" placeholder="Search Games" onkeyup="filterZones()" />

  <div id="topControls">
    <div id="dataButtons">
      <button onclick="saveData()">Save Data</button>
      <button onclick="document.getElementById('file').click()">Load Data</button>
      <p>Saving data will create a file with all of your save data. When pressing load data, select that file to use your game states.</p>
      <input type="file" id="file" style="display:none" onchange="loadData(event)" />
    </div>
    <select id="sortOptions" onchange="sortZones()">
      <option value="name">by Nameㅤ</option>
      <option value="id">by Idㅤ</option>
      <option value="popular">by Popularityㅤ</option>
    </select>
  </div>

  <div class="zone-wrapper">
    <div id="zoneCount" class="zone-count"></div>
    <div id="container">Loading...</div>
  </div>

  <div id="zoneViewer" style="display:none;">
    <div id="zoneInfo">
      <div id="zoneTitle">
        <span id="zoneName"></span> <span id="zoneId"></span>
      </div>
      <div id="controls">
        <button onclick="closeZone()">Close</button>
        <button onclick="fullscreenZone()">Fullscreen</button>
        <button onclick="aboutBlank()">about:blank (Use if embed is broken.)</button>
      </div>
    </div>
    <iframe id="zoneFrame"></iframe>
  </div>

  <button id="darkModeToggle">Toggle Dark Mode</button>

  <div id="creditsPopup" style="display:none; position: fixed; top: 50%; left: 50%; transform: translate(-50%, -50%);
  background: #222; color: white; border-radius: 8px; padding: 20px; width: 300px; max-width: 90vw; box-shadow: 0 0 15px rgba(0,0,0,0.7); z-index: 1200;">
  <h2 style="margin-top:0;">Credits</h2>
  <ul style="padding-left: 20px; margin-bottom: 20px;">
    <li>Developer - Derrick Richard</li>
  <li>
  Comments - 
  <a href="https://github.com/GM-Math" target="_blank">GM-Math</a>
</li>
  </ul>
  <button id="closeCredits" style="padding: 6px 12px; background-color: #007bff; border: none; border-radius: 4px; color: white; cursor: pointer;">
    Close
  </button>
</div>

  <script src="script.js"></script>
</body>

</html>
